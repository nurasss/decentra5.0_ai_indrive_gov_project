<!DOCTYPE html>
<html class="chat-root" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZanAi Chat</title>
    <meta
      name="description"
      content="ZanAi — чат для анализа законодательства. История диалогов и ответы через API."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./chat.css" />
  </head>
  <body class="gpt-app">
    <div class="gpt-overlay" id="sidebarOverlay" aria-hidden="true" tabindex="-1"></div>

    <aside class="gpt-sidebar" id="gptSidebar" aria-label="История чатов">
      <div class="gpt-sidebar-head">
        <a class="gpt-sidebar-brand" href="./index.html" title="На главную">
          <span class="gpt-sidebar-brand-mark">ZA</span>
          <span class="gpt-sidebar-brand-text">ZanAi</span>
        </a>
      </div>

      <button type="button" class="gpt-btn-new" id="newChatBtn">
        <span class="gpt-btn-new-icon" aria-hidden="true">+</span>
        Новый чат
      </button>

      <div class="gpt-history-label">История</div>
      <nav class="gpt-history" id="chatHistoryList"></nav>

      <div class="gpt-sidebar-foot">
        <a class="gpt-sidebar-link" href="./index.html">← На главную</a>
        <a class="gpt-sidebar-link" href="./index.html#platform">Платформа</a>
      </div>
    </aside>

    <div class="gpt-shell">
      <header class="gpt-topbar">
        <button type="button" class="gpt-icon-btn" id="sidebarToggle" aria-label="Меню" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 12h18M3 6h18M3 18h18" />
          </svg>
        </button>
        <div class="gpt-topbar-title" id="topbarTitle">ZanAi</div>
        <div class="gpt-mode-wrap" role="tablist" aria-label="Режим">
          <button type="button" class="gpt-mode-pill active" data-tab="assistant" role="tab">Ассистент</button>
          <button type="button" class="gpt-mode-pill" data-tab="review" role="tab">Проверка</button>
          <button type="button" class="gpt-mode-pill" data-tab="summary" role="tab">Резюме</button>
        </div>
        <div class="gpt-pane-switch" role="tablist" aria-label="Окна">
          <button type="button" class="gpt-pane-pill active" data-pane="split">2 окна</button>
          <button type="button" class="gpt-pane-pill" data-pane="analyze">Analyze</button>
          <button type="button" class="gpt-pane-pill" data-pane="compare">Compare</button>
        </div>
      </header>

      <p class="gpt-mode-hint" id="modeHint"></p>

      <main class="gpt-dual-grid" aria-live="polite">
        <section class="gpt-workspace">
          <div class="gpt-workspace-head">
            <h3>Analyze</h3>
            <span class="gpt-workspace-badge">/api/analyze</span>
          </div>

          <div class="gpt-messages gpt-messages--pane" id="analyzeWindow"></div>

          <div class="gpt-example-chips" aria-label="Примеры запросов">
            <span class="gpt-chips-label">Попробовать:</span>
            <button type="button" class="gpt-chip" data-pane="analyze" data-text="Ставка налога на добавленную стоимость составляет 12 процентов.">НДС 12%</button>
            <button type="button" class="gpt-chip" data-pane="analyze" data-text="Индивидуальный предприниматель обязан подать налоговую декларацию не позднее 31 марта текущего года.">Декларация ИП</button>
            <button type="button" class="gpt-chip" data-pane="analyze" data-text="Работодатель обязан предупредить работника о сокращении не менее чем за один месяц.">Сокращение</button>
            <button type="button" class="gpt-chip" data-pane="analyze" data-text="Трудовой кодекс Республики Казахстан">Трудовой кодекс</button>
          </div>
          <div class="gpt-pane-composer">
            <textarea
              id="analyzeInput"
              class="gpt-input"
              rows="2"
              placeholder="Введите норму, название акта или фрагмент документа…"
              autocomplete="off"
            ></textarea>
            <button type="button" class="gpt-send" id="analyzeSend" aria-label="Запустить анализ">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 19V5M5 12l7-7 7 7" />
              </svg>
            </button>
          </div>
        </section>

        <section class="gpt-workspace">
          <div class="gpt-workspace-head">
            <h3>Compare</h3>
            <span class="gpt-workspace-badge">/api/compare</span>
          </div>

          <div class="gpt-messages gpt-messages--pane" id="compareWindow"></div>

          <div class="gpt-example-chips" aria-label="Примеры для сравнения">
            <span class="gpt-chips-label">Примеры:</span>
            <button type="button" class="gpt-chip" data-pane="compare"
              data-text-a="Налог должен быть уплачен в течение 10 календарных дней после получения уведомления."
              data-text-b="Налог уплачивается в течение 30 календарных дней с момента получения требования об уплате.">Сроки уплаты</button>
            <button type="button" class="gpt-chip" data-pane="compare"
              data-text-a="Работник имеет право на ежегодный оплачиваемый отпуск продолжительностью не менее 24 календарных дней."
              data-text-b="Минимальная продолжительность ежегодного трудового отпуска составляет 28 календарных дней.">Отпуск</button>
            <button type="button" class="gpt-chip" data-pane="compare"
              data-text-a="Ставка корпоративного подоходного налога составляет 20 процентов от налогооблагаемого дохода."
              data-text-b="Корпоративный подоходный налог уплачивается по ставке 15 процентов.">КПН ставки</button>
          </div>
          <div class="gpt-pane-composer gpt-pane-composer--stack">
            <textarea
              id="compareInputA"
              class="gpt-input gpt-input--compare"
              rows="2"
              placeholder="Норма A…"
              autocomplete="off"
            ></textarea>
            <textarea
              id="compareInputB"
              class="gpt-input gpt-input--compare"
              rows="2"
              placeholder="Норма B…"
              autocomplete="off"
            ></textarea>
            <button type="button" class="gpt-send gpt-send--wide" id="compareSend" aria-label="Сравнить нормы">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 19V5M5 12l7-7 7 7" />
              </svg>
            </button>
          </div>
        </section>
      </main>

      <p class="gpt-disclaimer gpt-disclaimer--fixed">
        ZanAi может допускать ошибки. Проверяйте важные нормы с юристом. API:
        <code class="gpt-code">/api/analyze</code> и <code class="gpt-code">/api/compare</code>
      </p>
    </div>

    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
      mermaid.initialize({ startOnLoad: false, theme: "neutral" });
      window.__mermaidRender = async (el) => {
        const code = el.textContent.trim();
        if (!code.startsWith("graph") && !code.startsWith("flowchart")) return;
        try {
          const id = "mermaid-" + Math.random().toString(36).slice(2, 9);
          const { svg } = await mermaid.render(id, code);
          const wrapper = document.createElement("div");
          wrapper.className = "mermaid-diagram";
          wrapper.innerHTML = svg;
          el.replaceWith(wrapper);
        } catch {
          /* leave as text if render fails */
        }
      };
    </script>
    <script>
      // Example chips — fill inputs on click
      document.addEventListener("click", function(e) {
        const chip = e.target.closest(".gpt-chip");
        if (!chip) return;
        const pane = chip.dataset.pane;
        if (pane === "analyze") {
          const input = document.getElementById("analyzeInput");
          if (input) { input.value = chip.dataset.text; input.focus(); input.dispatchEvent(new Event("input")); }
        } else if (pane === "compare") {
          const a = document.getElementById("compareInputA");
          const b = document.getElementById("compareInputB");
          if (a) { a.value = chip.dataset.textA || ""; a.dispatchEvent(new Event("input")); }
          if (b) { b.value = chip.dataset.textB || ""; b.focus(); b.dispatchEvent(new Event("input")); }
        }
      });
    </script>
    <script src="./chat.js"></script>
  </body>
</html>
